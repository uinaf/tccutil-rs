## release-plz configuration
## Reference: https://release-plz.dev/docs/config

[workspace]
# Conventional Commits → semver bumps. release-plz analyzes commits since the
# previous tag, decides the next version, and opens a Release PR that bumps
# Cargo.toml + writes CHANGELOG.md. Merging that PR creates the git tag and
# GitHub Release. The tag push then triggers .github/workflows/release.yml,
# which builds binaries and updates the Homebrew formula.
changelog_update = true
git_release_enable = true
# This is a binary crate; nothing publishes to crates.io.
publish = false
# Skip semver-check: we don't publish a library, only a binary, so API
# breakage (e.g., a renamed CLI flag) is not blocked by SemVer rules — it's
# tracked as `feat!:` / `BREAKING CHANGE:` in commits and bumps the major.
semver_check = false

[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file. The
format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and
this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
## [{{ version }}]{% if release_link %}({{ release_link }}){% endif %} - {{ timestamp | date(format=\"%Y-%m-%d\") }}
{% for group, commits in commits | group_by(attribute=\"group\") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}
"""
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI" },
  { message = "^chore", group = "Chores", skip = true },
  { message = "^style", skip = true },
]

[[package]]
name = "tccutil-rs"
# Use the `v` prefix on git tags (matches existing v0.1.0, v0.1.1, v0.2.0).
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"
changelog_path = "CHANGELOG.md"
