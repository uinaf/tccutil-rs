name: Release

# Tag-driven binary build and Homebrew tap update.
#
# Triggered by tags pushed by the release-plz workflow on main when a Release
# PR is merged. Builds dual-arch macOS tarballs, attaches them + checksums.txt
# to the GitHub Release that release-plz pre-created, then opens a PR against
# uinaf/homebrew-tap to bump Formula/tccutil-rs.rb.
#
# The job is intentionally NOT triggered on push to main directly — the
# version decision is owned by release-plz, never by this workflow.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Package release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/arm64 dist/amd64
          cp target/aarch64-apple-darwin/release/tccutil-rs dist/arm64/tccutil-rs
          cp target/x86_64-apple-darwin/release/tccutil-rs dist/amd64/tccutil-rs
          chmod +x dist/arm64/tccutil-rs dist/amd64/tccutil-rs

          tar -C dist/arm64 -czf "tccutil-rs_v${VERSION}_darwin-arm64.tar.gz" tccutil-rs
          tar -C dist/amd64 -czf "tccutil-rs_v${VERSION}_darwin-amd64.tar.gz" tccutil-rs

          shasum -a 256 \
            "tccutil-rs_v${VERSION}_darwin-arm64.tar.gz" \
            "tccutil-rs_v${VERSION}_darwin-amd64.tar.gz" \
            > checksums.txt

      - name: Attach assets to GitHub Release
        # release-plz already created the Release with changelog notes; this
        # step appends the binaries and checksums to the same Release.
        uses: softprops/action-gh-release@v2
        with:
          # Don't overwrite the changelog body that release-plz wrote.
          generate_release_notes: false
          files: |
            tccutil-rs_v*_darwin-arm64.tar.gz
            tccutil-rs_v*_darwin-amd64.tar.gz
            checksums.txt

      - name: Bump Homebrew formula on uinaf/homebrew-tap
        # Computes the tarball sha256 from the GitHub-hosted release archive,
        # rewrites Formula/tccutil-rs.rb on the tap, and opens a PR. Runs
        # after the assets are attached so the action can fetch them.
        uses: dawidd6/action-homebrew-bump-formula@v5
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          tap: uinaf/homebrew-tap
          formula: tccutil-rs
          tag: ${{ github.ref_name }}
