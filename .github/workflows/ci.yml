name: CI

on:
  pull_request:
  push:
    branches: [main]

# Concurrency is intentionally job-level, not workflow-level. A workflow-
# level cancellable group would also cancel the `release` job mid-flight if
# a second push to `main` arrived — semantic-release would have created the
# tag and GitHub Release, but binary assets and the Homebrew bump would
# never run, leaving a half-published release. Job-level groups let verify
# stay cancellable while release queues.

jobs:
  verify:
    # Skip the bot-authored bump commit's `[skip ci]` push. PR runs always go
    # through (no `head_commit` on pull_request events; gating on event_name
    # avoids the null-deref that would otherwise prevent the job scheduling).
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    name: Verify
    runs-on: macos-latest
    permissions:
      contents: read
    concurrency:
      group: verify-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify
        run: scripts/verify.sh

      - name: Coverage
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov --fail-under-lines 75

      - name: Build release
        run: cargo build --release

  # Push-to-main release. semantic-release decides the next version from
  # Conventional Commits since the last `v*` tag, runs scripts/release-
  # prepare.sh to bump Cargo.toml + Cargo.lock, commits the bump back to
  # main with [skip ci], creates the GitHub Release, then we build dual-arch
  # macOS tarballs and bump the Homebrew formula on uinaf/homebrew-tap.
  #
  # Mirrors the shape used by uinaf/react-json-logic.
  release:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]') }}
    name: Release
    needs: [verify]
    runs-on: macos-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: release-${{ github.repository }}-main
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install Rust toolchain (from rust-toolchain.toml + darwin cross-compile targets)
        # `rustup show` installs the channel pinned in rust-toolchain.toml
        # (1.93). The `target add` calls then attach the cross-compile
        # targets to that *same* pinned toolchain — using
        # dtolnay/rust-toolchain@stable here would install targets onto a
        # different toolchain (stable) than the one cargo actually uses
        # when it sees rust-toolchain.toml, which silently fails the build.
        run: |
          rustup show
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Setup Node (for semantic-release plugins)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run semantic-release
        id: release
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/exec
            @semantic-release/git
            @semantic-release/github
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: glitch418x
          GIT_AUTHOR_EMAIL: 189487110+glitch418x@users.noreply.github.com
          GIT_COMMITTER_NAME: glitch418x
          GIT_COMMITTER_EMAIL: 189487110+glitch418x@users.noreply.github.com

      - name: Build dual-arch macOS binaries
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin

      - name: Package release artifacts
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          VERSION="${{ steps.release.outputs.new_release_version }}"
          mkdir -p dist/arm64 dist/amd64
          cp target/aarch64-apple-darwin/release/tccutil-rs dist/arm64/tccutil-rs
          cp target/x86_64-apple-darwin/release/tccutil-rs dist/amd64/tccutil-rs
          chmod +x dist/arm64/tccutil-rs dist/amd64/tccutil-rs

          tar -C dist/arm64 -czf "tccutil-rs_v${VERSION}_darwin-arm64.tar.gz" tccutil-rs
          tar -C dist/amd64 -czf "tccutil-rs_v${VERSION}_darwin-amd64.tar.gz" tccutil-rs

          shasum -a 256 \
            "tccutil-rs_v${VERSION}_darwin-arm64.tar.gz" \
            "tccutil-rs_v${VERSION}_darwin-amd64.tar.gz" \
            > checksums.txt

      - name: Attach assets to GitHub Release
        # semantic-release already created the Release with changelog notes;
        # this step appends the binaries and checksums to the same Release.
        if: steps.release.outputs.new_release_published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.new_release_git_tag }}
          generate_release_notes: false
          files: |
            tccutil-rs_v*_darwin-arm64.tar.gz
            tccutil-rs_v*_darwin-amd64.tar.gz
            checksums.txt

      - name: Bump Homebrew formula on uinaf/homebrew-tap
        # Mirrors the GoReleaser-driven flow used by uinaf/healthd: clone
        # the tap with TAP_GITHUB_TOKEN, sed the formula in place, push
        # straight to the tap's main branch. No fork, no PR, no OAuth-scope
        # gymnastics — works with a fine-grained PAT scoped only to the
        # tap repo. Runs after assets are attached so the sha256s in
        # checksums.txt match what's actually on the Release.
        if: steps.release.outputs.new_release_published == 'true'
        env:
          VERSION: ${{ steps.release.outputs.new_release_version }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ARM64_SHA=$(awk '/_darwin-arm64\.tar\.gz$/ { print $1 }' checksums.txt)
          AMD64_SHA=$(awk '/_darwin-amd64\.tar\.gz$/ { print $1 }' checksums.txt)
          [ -n "$ARM64_SHA" ] && [ -n "$AMD64_SHA" ] || { echo "missing checksums" >&2; exit 1; }

          git clone --depth=1 \
            "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/uinaf/homebrew-tap.git" \
            tap
          cd tap

          F=Formula/tccutil-rs.rb
          # Replace version, urls, sha256s. The sha256 lines are matched in
          # block order: arm64 block comes before amd64 in the formula.
          awk -v v="$VERSION" -v arm="$ARM64_SHA" -v amd="$AMD64_SHA" '
            /^  version "/ { print "  version \"" v "\""; next }
            /tccutil-rs_v[0-9.]+_darwin-arm64\.tar\.gz/ {
              gsub(/v[0-9]+\.[0-9]+\.[0-9]+/, "v" v); print; next
            }
            /tccutil-rs_v[0-9.]+_darwin-amd64\.tar\.gz/ {
              gsub(/v[0-9]+\.[0-9]+\.[0-9]+/, "v" v); print; next
            }
            !done_arm && /sha256 "[a-f0-9]+"/ {
              sub(/"[a-f0-9]+"/, "\"" arm "\""); done_arm=1; print; next
            }
            done_arm && !done_amd && /sha256 "[a-f0-9]+"/ {
              sub(/"[a-f0-9]+"/, "\"" amd "\""); done_amd=1; print; next
            }
            { print }
          ' "$F" > "$F.new"
          mv "$F.new" "$F"

          git -c user.name=glitch418x -c user.email=189487110+glitch418x@users.noreply.github.com \
            commit -am "tccutil-rs ${VERSION}"
          git push origin main