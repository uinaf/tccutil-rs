name: release-plz

# Push-to-main version manager.
#
# On every push to main, release-plz:
#   1. Runs `release-plz release` — if the previous push merged a Release PR,
#      this creates the git tag and GitHub Release. The tag triggers
#      `release.yml`, which builds binaries and bumps the Homebrew formula.
#   2. Runs `release-plz update` — opens (or refreshes) a Release PR that
#      bumps Cargo.toml + writes CHANGELOG.md based on Conventional Commits
#      since the last tag.
#
# The Release PR is the explicit-merge gate that replaces the typical
# semantic-release `[skip ci]` bump-back loop. Maintainers review the
# proposed version + changelog and merge when ready.
#
# The release-plz token must belong to a real bot identity (`glitch418x`)
# rather than `GITHUB_TOKEN`, because PRs opened by `GITHUB_TOKEN` do not
# trigger downstream workflows (CI on the Release PR, release.yml on the
# tag). See https://release-plz.dev/docs/github/token for details.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release-plz-release:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    name: release-plz / release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  release-plz-pr:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    name: release-plz / pr
    runs-on: ubuntu-latest
    # Run after the release job so we don't open a stale Release PR while a
    # tag is still being created.
    needs: [release-plz-release]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Run release-plz pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
